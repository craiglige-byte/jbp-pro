<script>var countdownEnd=Date.now()+60000;function checkCountdown(){if(Date.now()<countdownEnd){showToast('请仔细研读年度计划，阅读时长建议不少于一分钟。');return false}return true}function showToast(msg){document.getElementById('toast-msg').textContent=msg;document.getElementById('toast').classList.add('show');setTimeout(function(){document.getElementById('toast').classList.remove('show')},3000)}function handleApprove(){if(!checkCountdown())return;document.getElementById('approve-modal').classList.add('show')}function closeApprove(){document.getElementById('approve-modal').classList.remove('show')}function confirmApprove(){document.getElementById('approval-card').className='result-card approved';document.getElementById('approval-card').innerHTML='<div>✓ 审批结果：已通过</div>';closeApprove()}function handleReject(){if(!checkCountdown())return;document.getElementById('reject-modal').classList.add('show')}function closeReject(){document.getElementById('reject-modal').classList.remove('show')}function confirmReject(){var r=document.getElementById('reject-reason').value.trim();if(!r){alert('请填写驳回原因');return}document.getElementById('approval-card').innerHTML='<div style="text-align:center;padding:20px;color:#991b1b;font-weight:600;font-size:15px">已驳回当前审批</div><div style="text-align:center;padding:0 20px 16px;color:#64748b;font-size:13px">驳回备注：'+r+'</div>';closeReject()}</script></body></html>
