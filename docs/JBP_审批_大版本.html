<script>(function(){var s=60;var e=document.getElementById('countdown');var a=document.getElementById('btn-approve');var r=document.getElementById('btn-reject');var t=setInterval(function(){s--;e.textContent=s;if(s<=30)e.className='time warn';if(s<=0){clearInterval(t);e.textContent='0';e.className='time ready';a.disabled=false;r.disabled=false}},1000)})();function handleApprove(){if(!confirm('确认批准该年度生意计划？'))return;document.getElementById('approval-bar').innerHTML='<div class="result approved">审批结果：已通过</div>'}function handleReject(){document.getElementById('reject-modal').classList.add('show')}function closeReject(){document.getElementById('reject-modal').classList.remove('show')}function confirmReject(){var r=document.getElementById('reject-reason').value||'（无）';document.getElementById('approval-bar').innerHTML='<div class="result rejected">审批结果：已驳回 · '+r+'</div>';closeReject()}</script>
