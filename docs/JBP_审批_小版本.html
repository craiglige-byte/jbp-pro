#comment-panel .input-area .submit-row{display:flex;justify-content:flex-end;margin-top:8px}

#approval-card{margin:16px 0 0;padding:24px 32px;border-radius:16px 16px 0 0;background:#fff;border:1px solid #e2e8f0;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.btn-approve{background:#10b981;color:#fff}.btn-approve:hover{background:#059669}
.btn-reject{background:#ef4444;color:#fff}.btn-reject:hover{background:#dc2626}
#reject-modal{display:none;position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.6);align-items:center;justify-content:center}
#reject-modal.show{display:flex}

#reject-modal .actions button{padding:8px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.cancel{background:#f1f5f9;color:#475569}.confirm{background:#ef4444;color:#fff}
#approve-modal{display:none;position:fixed;inset:0;z-index:99999;background:rgba(15,23,42,.6);align-items:center;justify-content:center}
#approve-modal.show{display:flex}
#approve-modal .modal{background:#fff;border-radius:16px;padding:28px;max-width:400px;width:90%;text-align:center}
#approve-modal h3{font-size:18px;margin:0 0 8px;color:#1e293b}
#approve-modal p{font-size:14px;color:#64748b;margin:0 0 24px}
#approve-modal .actions{display:flex;gap:12px;justify-content:center}
#toast{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;background:#fef3c7;color:#92400e;padding:10px 24px;border-radius:8px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.1);align-items:center;gap:8px}
#toast.show{display:flex}
.result-card{margin:16px 0 0;padding:24px 32px;border-radius:16px 16px 0 0;text-align:center;font-size:15px;font-weight:600}
.result-card.approved{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.result-card.rejected{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
@media print{#comment-sidebar,#comment-panel{display:none!important}}
</style>

<body class="bg-slate-50 text-slate-900"><div id="root"></div>

<div id="comment-sidebar"><button id="comment-btn" onclick="toggleComments()">评 论</button><div id="comment-badge" style="display:none">0</div></div>
<div id="comment-panel">
  <div class="header"><span style="font-weight:600;font-size:15px">评论</span><button onclick="toggleComments()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#94a3b8">&times;</button></div>
  <div class="list" id="comment-list"><p style="color:#94a3b8;text-align:center;margin-top:40px">暂无评论</p></div>
  <div class="input-area">
    <div class="user-info"><div class="avatar-sm">审</div><span class="name">审批人</span></div>
    <textarea id="comment-input" placeholder="输入评论..." maxlength="200"></textarea>
    <div class="submit-row"><button onclick="addComment()">发表</button></div>
  </div>
</div>

<div id="approval-card"><p>请仔细审阅以上年度计划内容，完成审批。</p><div class="btns"><button class="btn-approve" onclick="handleApprove()">通过</button><button class="btn-reject" onclick="handleReject()">驳回</button></div></div>
<div id="reject-modal"><div class="modal"><h3>驳回审批</h3><p>请填写审批备注（必填，200字以内）</p><textarea id="reject-reason" placeholder="请输入驳回原因..." maxlength="200" oninput="document.getElementById('char-count').textContent=this.value.length+'/200'"></textarea><div class="char-count" id="char-count">0/200</div><div class="actions"><button class="cancel" onclick="closeReject()">取消</button><button class="confirm" onclick="confirmReject()">确认驳回</button></div></div></div>
<div id="approve-modal"><div class="modal"><h3>通过审批</h3><p>确认通过此年度生意计划审批？</p><div class="actions"><button class="cancel" onclick="closeApprove()">取消</button><button class="btn-approve-confirm" onclick="confirmApprove()">确认通过</button></div></div></div>
<div id="toast"><span>⏱</span><span id="toast-msg"></span></div>

<script>
var countdownEnd=Date.now()+60000;
function checkCountdown(){if(Date.now()<countdownEnd){showToast('请仔细研读年度计划，阅读时长建议不少于一分钟。');return false}return true}
function showToast(msg){document.getElementById('toast-msg').textContent=msg;document.getElementById('toast').classList.add('show');setTimeout(function(){document.getElementById('toast').classList.remove('show')},3000)}
var comments=[];
function toggleComments(){document.getElementById('comment-panel').classList.toggle('show')}
function addComment(){var t=document.getElementById('comment-input').value.trim();if(!t)return;comments.push({id:Date.now(),text:t,name:'审批人',avatar:'审',time:new Date().toLocaleString(),replies:[]});document.getElementById('comment-input').value='';renderComments()}
function addReply(cid){var e=document.getElementById('reply-input-'+cid);var t=e.value.trim();if(!t)return;var c=comments.find(function(x){return x.id===cid});if(!c)return;c.replies.push({id:Date.now(),text:t,name:'审批人',avatar:'审',time:new Date().toLocaleString()});e.value='';renderComments()}
function deleteComment(id){if(!confirm('确定删除这条评论？'))return;comments=comments.filter(function(x){return x.id!==id});renderComments()}
function deleteReply(cid,rid){if(!confirm('确定删除这条回复？'))return;var c=comments.find(function(x){return x.id===cid});if(!c)return;c.replies=c.replies.filter(function(x){return x.id!==rid});renderComments()}
function renderComments(){
  var l=document.getElementById('comment-list');
  if(comments.length===0){l.innerHTML='<p style="color:#94a3b8;text-align:center;margin-top:40px">暂无评论</p>';document.getElementById('comment-badge').style.display='none';return}
  document.getElementById('comment-badge').style.display='flex';document.getElementById('comment-badge').textContent=comments.length;
  l.innerHTML=comments.map(function(c){
    var r='';if(c.replies.length>0){r='<div class="replies">'+c.replies.map(function(x){return '<div class="reply-item"><div class="user-row"><div class="avatar-sm">'+x.avatar+'</div><span class="name">'+x.name+'</span><span class="time">'+x.time+'</span></div><div class="text">'+x.text+'</div><div class="actions"><button class="del-btn" onclick="deleteReply('+c.id+','+x.id+')">删除</button></div></div>'}).join('')+'</div>'}
    return '<div class="item"><div class="user-row"><div class="avatar">'+c.avatar+'</div><span class="name">'+c.name+'</span><span class="time">'+c.time+'</span></div><div class="text">'+c.text+'</div><div class="actions"><button class="reply-btn" onclick="var n=this.parentElement.nextElementSibling;n.style.display=n.style.display==\'flex\'?\'none\':\'flex\'">回复</button><button class="del-btn" onclick="deleteComment('+c.id+')">删除</button></div><div class="reply-form" style="display:none"><input id="reply-input-'+c.id+'" placeholder="输入回复..."><button onclick="addReply('+c.id+')">回复</button></div>'+r+'</div>';
  }).join('')}
function handleApprove(){if(!checkCountdown())return;document.getElementById('approve-modal').classList.add('show')}
function closeApprove(){document.getElementById('approve-modal').classList.remove('show')}
function confirmApprove(){document.getElementById('approval-card').className='result-card approved';document.getElementById('approval-card').innerHTML='<div>✓ 审批结果：已通过</div>';closeApprove()}
function handleReject(){if(!checkCountdown())return;document.getElementById('reject-modal').classList.add('show')}
function closeReject(){document.getElementById('reject-modal').classList.remove('show')}
function confirmReject(){var r=document.getElementById('reject-reason').value.trim();if(!r){alert('请填写驳回原因');return}document.getElementById('approval-card').className='result-card rejected';document.getElementById('approval-card').innerHTML='<div>✗ 审批结果：已驳回</div><div style="font-size:13px;font-weight:400;margin-top:8px">'+r+'</div>';closeReject()}
</script></body></html>
