#reject-modal .actions button{padding:8px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.cancel{background:#f1f5f9;color:#475569}.confirm{background:#ef4444;color:#fff}

#approve-modal.show{display:flex}
#approve-modal .modal{background:#fff;border-radius:16px;padding:28px;max-width:400px;width:90%;text-align:center}

#approve-modal .actions{display:flex;gap:12px;justify-content:center}
#toast{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;background:#fef3c7;color:#92400e;padding:10px 24px;border-radius:8px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.1);align-items:center;gap:8px}
#toast.show{display:flex}
.result-card{max-width:1280px;margin:16px auto;padding:24px 32px;border-radius:16px;padding:28px 32px;text-align:center;font-size:15px;font-weight:600}
.result-card.approved{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}

@media print{#comment-sidebar,#comment-panel{display:none!important}}
</style>

<body class="bg-slate-50 text-slate-900">
<div id="root"></div>
<div id="comment-sidebar"><button id="comment-btn" onclick="toggleComments()">审 批 评 论</button><div id="comment-badge" style="display:none">0</div></div>
<div id="comment-panel"><div class="header"><span style="font-weight:600;font-size:15px">审批评论</span><button onclick="toggleComments()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#94a3b8">&times;</button></div><div class="list" id="comment-list"><p style="color:#94a3b8;text-align:center;margin-top:40px">暂无评论</p></div><div class="input-area"><textarea id="comment-input" placeholder="输入评论..." maxlength="200"></textarea><button onclick="addComment()">发表评论</button></div></div>
<div id="approval-card"><p>请仔细审阅以上年度计划内容，完成审批。</p><div class="btns"><button class="btn-approve" onclick="handleApprove()">通过</button><button class="btn-reject" onclick="handleReject()">驳回</button></div></div>
<div id="reject-modal"><div class="modal"><h3>驳回审批</h3><p>请填写审批备注（必填，200字以内）</p><textarea id="reject-reason" placeholder="请输入驳回原因..." maxlength="200" oninput="document.getElementById('char-count').textContent=this.value.length+'/200'"></textarea><div class="char-count" id="char-count">0/200</div><div class="actions"><button class="cancel" onclick="closeReject()">取消</button><button class="confirm" onclick="confirmReject()">确认驳回</button></div></div></div>
<div id="approve-modal"><div class="modal"><h3>通过审批</h3><p>确认通过此年度生意计划审批？</p><div class="actions"><button class="cancel" onclick="closeApprove()">取消</button><button class="btn-approve-confirm" onclick="confirmApprove()">确认通过</button></div></div></div>
<div id="toast"><span>⏱</span><span id="toast-msg"></span></div>
<script>
var countdownEnd=Date.now()+60000;
function checkCountdown(){if(Date.now()<countdownEnd){showToast('请仔细研读年度计划，阅读时长建议不少于一分钟。');return false}return true}
function showToast(msg){document.getElementById('toast-msg').textContent=msg;document.getElementById('toast').classList.add('show');setTimeout(function(){document.getElementById('toast').classList.remove('show')},3000)}
var comments=[];
function toggleComments(){document.getElementById('comment-panel').classList.toggle('show')}
function addComment(){var t=document.getElementById('comment-input').value.trim();if(!t)return;comments.push({text:t,time:new Date().toLocaleString()});document.getElementById('comment-input').value='';renderComments()}
function renderComments(){var l=document.getElementById('comment-list');if(comments.length===0){l.innerHTML='<p style="color:#94a3b8;text-align:center;margin-top:40px">暂无评论</p>';document.getElementById('comment-badge').style.display='none';return}document.getElementById('comment-badge').style.display='flex';document.getElementById('comment-badge').textContent=comments.length;l.innerHTML=comments.map(function(c){return '<div class="item"><div>'+c.text+'</div><div class="meta">'+c.time+'</div></div>'}).join('')}
function handleApprove(){if(!checkCountdown())return;document.getElementById('approve-modal').classList.add('show')}
function closeApprove(){document.getElementById('approve-modal').classList.remove('show')}
function confirmApprove(){document.getElementById('approval-card').className='result-card approved';document.getElementById('approval-card').innerHTML='<div>✓ 审批结果：已通过</div>';closeApprove()}
function handleReject(){if(!checkCountdown())return;document.getElementById('reject-modal').classList.add('show')}
function closeReject(){document.getElementById('reject-modal').classList.remove('show')}
function confirmReject(){var r=document.getElementById('reject-reason').value.trim();if(!r){alert('请填写驳回原因');return}document.getElementById('approval-card').className='result-card rejected';document.getElementById('approval-card').innerHTML='<div>✗ 审批结果：已驳回</div><div style="font-size:13px;font-weight:400;margin-top:8px">'+r+'</div>';closeReject()}
</script></body></html>
